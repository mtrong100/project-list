<style>
/* ══════════════════════════════════════════════
   MATERIAL DESIGN 3 — TOKENS (Light Scheme)
   Based on MD3 Baseline + Blue primary
══════════════════════════════════════════════ */
:root {
  /* Primary */
  --md-sys-color-primary:                  #1565C0;
  --md-sys-color-on-primary:               #FFFFFF;
  --md-sys-color-primary-container:        #D6E4FF;
  --md-sys-color-on-primary-container:     #001945;
  /* Secondary */
  --md-sys-color-secondary:               #555F71;
  --md-sys-color-on-secondary:            #FFFFFF;
  --md-sys-color-secondary-container:     #D9E3F8;
  --md-sys-color-on-secondary-container:  #121C2B;
  /* Tertiary */
  --md-sys-color-tertiary:                #6E5676;
  --md-sys-color-on-tertiary:             #FFFFFF;
  --md-sys-color-tertiary-container:      #F6D9FF;
  --md-sys-color-on-tertiary-container:   #27103B;
  /* Error */
  --md-sys-color-error:                   #BA1A1A;
  --md-sys-color-on-error:                #FFFFFF;
  --md-sys-color-error-container:         #FFDAD6;
  --md-sys-color-on-error-container:      #410002;
  /* Surface */
  --md-sys-color-surface-dim:             #D9D9E0;
  --md-sys-color-surface:                 #F9F9FF;
  --md-sys-color-surface-bright:          #F9F9FF;
  --md-sys-color-surface-container-lowest:#FFFFFF;
  --md-sys-color-surface-container-low:   #F3F3FA;
  --md-sys-color-surface-container:       #EDEDF4;
  --md-sys-color-surface-container-high:  #E7E7EE;
  --md-sys-color-surface-container-highest:#E2E2E9;
  --md-sys-color-on-surface:              #1A1B21;
  --md-sys-color-on-surface-variant:      #44474E;
  /* Outline */
  --md-sys-color-outline:                 #74777F;
  --md-sys-color-outline-variant:         #C4C6CF;
  /* Background */
  --md-sys-color-background:              #F9F9FF;
  --md-sys-color-on-background:           #1A1B21;
  /* Inverse */
  --md-sys-color-inverse-surface:         #2F3036;
  --md-sys-color-inverse-on-surface:      #F1F0F7;
  --md-sys-color-inverse-primary:         #ACC7FF;
  /* Scrim */
  --md-sys-color-scrim:                   rgba(0,0,0,0.32);
  --md-sys-color-shadow:                  rgba(0,0,0,0.12);

  /* Elevation overlays (tonal surface) */
  --md-elevation-1: 0 1px 2px rgba(0,0,0,.08), 0 1px 3px 1px rgba(0,0,0,.06);
  --md-elevation-2: 0 1px 2px rgba(0,0,0,.08), 0 2px 6px 2px rgba(0,0,0,.07);
  --md-elevation-3: 0 4px 8px 3px rgba(0,0,0,.09), 0 1px 3px rgba(0,0,0,.10);

  /* Shape */
  --md-shape-none:        0px;
  --md-shape-xs:          4px;
  --md-shape-sm:          8px;
  --md-shape-md:          12px;
  --md-shape-lg:          16px;
  --md-shape-xl:          28px;
  --md-shape-full:        9999px;

  /* Typography */
  --font: 'Be Vietnam Pro', system-ui, sans-serif;

  /* Motion */
  --md-motion-standard:   cubic-bezier(0.2, 0, 0, 1);
  --md-motion-decelerate: cubic-bezier(0, 0, 0, 1);
  --md-motion-accelerate: cubic-bezier(0.3, 0, 1, 1);
  --md-dur-short2: 100ms;
  --md-dur-short4: 200ms;
  --md-dur-medium2: 300ms;
  --md-dur-medium4: 400ms;
  --md-dur-long2: 500ms;

  /* Layout */
  --nav-height: 64px;
  --bottom-nav-height: 80px;
}

/* ─── Dark Scheme ─── */
[data-theme="dark"] {
  --md-sys-color-primary:                  #ACC7FF;
  --md-sys-color-on-primary:               #002D6D;
  --md-sys-color-primary-container:        #00429A;
  --md-sys-color-on-primary-container:     #D6E4FF;
  --md-sys-color-secondary:               #BBC7DB;
  --md-sys-color-on-secondary:            #263141;
  --md-sys-color-secondary-container:     #3D4758;
  --md-sys-color-on-secondary-container:  #D9E3F8;
  --md-sys-color-tertiary:                #D9B8E2;
  --md-sys-color-on-tertiary:             #3D2546;
  --md-sys-color-tertiary-container:      #553D5D;
  --md-sys-color-on-tertiary-container:   #F6D9FF;
  --md-sys-color-error:                   #FFB4AB;
  --md-sys-color-on-error:                #690005;
  --md-sys-color-error-container:         #93000A;
  --md-sys-color-on-error-container:      #FFDAD6;
  --md-sys-color-surface-dim:             #111318;
  --md-sys-color-surface:                 #111318;
  --md-sys-color-surface-bright:          #37393F;
  --md-sys-color-surface-container-lowest:#0C0E13;
  --md-sys-color-surface-container-low:   #191C22;
  --md-sys-color-surface-container:       #1E2026;
  --md-sys-color-surface-container-high:  #282A31;
  --md-sys-color-surface-container-highest:#33353C;
  --md-sys-color-on-surface:              #E2E2E9;
  --md-sys-color-on-surface-variant:      #C4C6CF;
  --md-sys-color-outline:                 #8E9099;
  --md-sys-color-outline-variant:         #44474E;
  --md-sys-color-background:              #111318;
  --md-sys-color-on-background:           #E2E2E9;
  --md-sys-color-inverse-surface:         #E2E2E9;
  --md-sys-color-inverse-on-surface:      #2F3036;
  --md-sys-color-inverse-primary:         #1565C0;
  --md-elevation-1: 0 1px 2px rgba(0,0,0,.25), 0 1px 3px 1px rgba(0,0,0,.22);
  --md-elevation-2: 0 1px 2px rgba(0,0,0,.28), 0 2px 6px 2px rgba(0,0,0,.22);
  --md-elevation-3: 0 4px 8px 3px rgba(0,0,0,.28), 0 1px 3px rgba(0,0,0,.30);
}

/* ─── Reset ─── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--md-sys-color-background);
  color: var(--md-sys-color-on-background);
  min-height: 100vh;
  min-height: 100dvh;
  transition: background var(--md-dur-medium2) var(--md-motion-standard),
              color var(--md-dur-medium2) var(--md-motion-standard);
  overflow-x: hidden;
}
a { color: var(--md-sys-color-primary); text-decoration: none; }
img { max-width: 100%; display: block; }
button { cursor: pointer; border: none; background: none; font-family: var(--font); }

/* ══════════════════════════════════════════════
   SVG ICON SYSTEM
══════════════════════════════════════════════ */
.icon {
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  width: 24px; height: 24px;
}
.icon svg { width: 100%; height: 100%; fill: currentColor; }
.icon-sm svg { width: 20px; height: 20px; }
.icon-lg svg { width: 32px; height: 32px; }

/* ══════════════════════════════════════════════
   TOP APP BAR — MD3 Small top app bar
══════════════════════════════════════════════ */
.top-app-bar {
  position: sticky; top: 0; z-index: 200;
  height: var(--nav-height);
  background: var(--md-sys-color-surface-container);
  display: flex; align-items: center;
  padding: 0 4px;
  transition: background var(--md-dur-medium2) var(--md-motion-standard),
              box-shadow var(--md-dur-short4) var(--md-motion-standard);
}
.top-app-bar.scrolled {
  background: var(--md-sys-color-surface-container-high);
  box-shadow: var(--md-elevation-2);
}
.bar-leading { padding-left: 4px; }
.bar-headline {
  flex: 1; padding: 0 4px;
  font-size: 22px; font-weight: 600; letter-spacing: -0.2px;
  color: var(--md-sys-color-on-surface);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bar-trailing { display: flex; align-items: center; padding-right: 4px; }

/* MD3 Icon Button */
.md-icon-btn {
  width: 48px; height: 48px;
  border-radius: var(--md-shape-full);
  display: flex; align-items: center; justify-content: center;
  color: var(--md-sys-color-on-surface-variant);
  position: relative; overflow: hidden;
  transition: background var(--md-dur-short4) var(--md-motion-standard),
              color var(--md-dur-short4) var(--md-motion-standard);
}
.md-icon-btn::before {
  content: ''; position: absolute; inset: 0;
  background: var(--md-sys-color-on-surface-variant);
  border-radius: inherit;
  opacity: 0;
  transition: opacity var(--md-dur-short4) var(--md-motion-standard);
}
.md-icon-btn:hover::before { opacity: 0.08; }
.md-icon-btn:active::before { opacity: 0.12; }
.md-icon-btn.active { color: var(--md-sys-color-primary); }

/* Language chip button */
.lang-chip {
  height: 32px; padding: 0 14px;
  border-radius: var(--md-shape-full);
  border: 1px solid var(--md-sys-color-outline);
  font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
  color: var(--md-sys-color-on-surface-variant);
  display: flex; align-items: center; gap: 6px;
  transition: all var(--md-dur-short4) var(--md-motion-standard);
  position: relative; overflow: hidden;
}
.lang-chip::before {
  content: ''; position: absolute; inset: 0;
  background: var(--md-sys-color-on-surface);
  opacity: 0; transition: opacity var(--md-dur-short4);
}
.lang-chip:hover::before { opacity: 0.06; }

/* ══════════════════════════════════════════════
   SEARCH BAR — MD3 Search view
══════════════════════════════════════════════ */
.search-section { padding: 16px 16px 8px; }
.search-bar {
  display: flex; align-items: center; gap: 4px;
  background: var(--md-sys-color-surface-container-high);
  border-radius: var(--md-shape-full);
  height: 56px; padding: 0 8px 0 16px;
  transition: background var(--md-dur-short4) var(--md-motion-standard),
              box-shadow var(--md-dur-short4) var(--md-motion-standard);
}
.search-bar:focus-within {
  background: var(--md-sys-color-surface-container-highest);
  box-shadow: var(--md-elevation-1);
}
.search-icon { color: var(--md-sys-color-on-surface-variant); flex-shrink: 0; }
.search-input {
  flex: 1; border: none; background: transparent;
  font-family: var(--font); font-size: 16px; font-weight: 400;
  color: var(--md-sys-color-on-surface); outline: none;
  min-width: 0;
}
.search-input::placeholder { color: var(--md-sys-color-on-surface-variant); }
.search-clear {
  width: 40px; height: 40px; border-radius: var(--md-shape-full);
  display: flex; align-items: center; justify-content: center;
  color: var(--md-sys-color-on-surface-variant);
  opacity: 0; pointer-events: none;
  transition: opacity var(--md-dur-short4);
  position: relative; overflow: hidden;
}
.search-clear::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: currentColor; opacity: 0;
  transition: opacity var(--md-dur-short4);
}
.search-clear:hover::before { opacity: 0.08; }
.search-clear.visible { opacity: 1; pointer-events: auto; }

/* ══════════════════════════════════════════════
   FILTER CHIPS — MD3 Filter chip
══════════════════════════════════════════════ */
.filter-row {
  padding: 4px 16px 8px;
  display: flex; gap: 8px;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  display: inline-flex; align-items: center; gap: 8px;
  height: 36px; padding: 0 16px;
  border-radius: var(--md-shape-sm);
  font-size: 14px; font-weight: 500; font-family: var(--font);
  white-space: nowrap; cursor: pointer;
  border: 1px solid var(--md-sys-color-outline);
  background: transparent;
  color: var(--md-sys-color-on-surface-variant);
  position: relative; overflow: hidden;
  transition: background var(--md-dur-short4) var(--md-motion-standard),
              border-color var(--md-dur-short4) var(--md-motion-standard),
              color var(--md-dur-short4) var(--md-motion-standard);
}
.filter-chip::before {
  content: ''; position: absolute; inset: 0;
  background: var(--md-sys-color-on-surface-variant);
  opacity: 0; transition: opacity var(--md-dur-short4);
}
.filter-chip:hover::before { opacity: 0.08; }
.filter-chip:active::before { opacity: 0.12; }
.filter-chip .chip-icon { width: 18px; height: 18px; display: flex; flex-shrink: 0; }
.filter-chip .chip-icon svg { width: 18px; height: 18px; fill: currentColor; }
.filter-chip .chip-check { display: none; }

.filter-chip.selected {
  background: var(--md-sys-color-secondary-container);
  border-color: transparent;
  color: var(--md-sys-color-on-secondary-container);
}
.filter-chip.selected::before {
  background: var(--md-sys-color-on-secondary-container);
}
.filter-chip.selected .chip-check { display: flex; }
.filter-chip.selected .chip-icon-base { display: none; }

/* ══════════════════════════════════════════════
   TOOLBAR
══════════════════════════════════════════════ */
.toolbar {
  padding: 4px 16px 12px;
  display: flex; align-items: center; gap: 8px;
}
.result-count {
  flex: 1; font-size: 14px; font-weight: 500;
  color: var(--md-sys-color-on-surface-variant);
}
/* MD3 Tonal button */
.tonal-btn {
  display: inline-flex; align-items: center; gap: 8px;
  height: 40px; padding: 0 16px 0 12px;
  border-radius: var(--md-shape-full);
  font-size: 14px; font-weight: 600; font-family: var(--font);
  background: var(--md-sys-color-secondary-container);
  color: var(--md-sys-color-on-secondary-container);
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: box-shadow var(--md-dur-short4) var(--md-motion-standard);
  border: none;
}
.tonal-btn::before {
  content: ''; position: absolute; inset: 0;
  background: var(--md-sys-color-on-secondary-container);
  opacity: 0; transition: opacity var(--md-dur-short4);
}
.tonal-btn:hover { box-shadow: var(--md-elevation-1); }
.tonal-btn:hover::before { opacity: 0.08; }
.tonal-btn:active::before { opacity: 0.12; }
.tonal-btn .btn-icon { width: 18px; height: 18px; display: flex; }
.tonal-btn .btn-icon svg { width: 18px; height: 18px; fill: currentColor; }

/* ══════════════════════════════════════════════
   PROJECT CARDS — MD3 Filled card
══════════════════════════════════════════════ */
.projects-container { padding: 0 16px 100px; }

.grid-layout {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}
.list-layout { display: flex; flex-direction: column; gap: 4px; }

/* Grid Card */
.project-card {
  background: var(--md-sys-color-surface-container-low);
  border-radius: var(--md-shape-xl);
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
  transition: box-shadow var(--md-dur-medium2) var(--md-motion-standard),
              background var(--md-dur-medium2) var(--md-motion-standard);
  cursor: default;
}
.project-card::before {
  content: ''; position: absolute; inset: 0;
  background: var(--md-sys-color-on-surface);
  opacity: 0; border-radius: inherit; pointer-events: none;
  transition: opacity var(--md-dur-short4);
}
.project-card:hover { box-shadow: var(--md-elevation-2); }
.project-card:hover::before { opacity: 0.05; }

.card-media {
  width: 100%; aspect-ratio: 16/9;
  background: var(--md-sys-color-surface-container);
  overflow: hidden; position: relative;
}
.card-media img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform var(--md-dur-medium4) var(--md-motion-decelerate),
              opacity var(--md-dur-medium2) var(--md-motion-standard);
}
.project-card:hover .card-media img { transform: scale(1.03); }
.card-media-placeholder {
  width: 100%; aspect-ratio: 16/9;
  background: linear-gradient(135deg,
    var(--md-sys-color-primary-container) 0%,
    var(--md-sys-color-secondary-container) 100%);
  display: flex; align-items: center; justify-content: center;
}
.card-media-placeholder .icon-lg { color: var(--md-sys-color-on-primary-container); opacity: 0.5; }

.card-body { padding: 16px 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }

/* MD3 Assist chip as category badge */
.category-chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 32px; padding: 0 12px;
  border-radius: var(--md-shape-sm);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: var(--md-sys-color-surface-container-lowest);
  font-size: 12px; font-weight: 600;
  color: var(--md-sys-color-on-surface-variant);
  letter-spacing: 0.2px;
  width: fit-content;
}
.category-chip .icon svg { width: 14px; height: 14px; }

.card-title {
  font-size: 16px; font-weight: 600; line-height: 1.35;
  color: var(--md-sys-color-on-surface);
  margin-top: 2px;
}
.card-actions {
  display: flex; gap: 8px; margin-top: auto; padding-top: 12px;
}

/* MD3 Filled button */
.btn-filled {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  height: 40px; border-radius: var(--md-shape-full);
  font-size: 14px; font-weight: 600; font-family: var(--font);
  background: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
  text-decoration: none;
  position: relative; overflow: hidden;
  transition: box-shadow var(--md-dur-short4) var(--md-motion-standard);
}
.btn-filled::before {
  content: ''; position: absolute; inset: 0;
  background: var(--md-sys-color-on-primary);
  opacity: 0; transition: opacity var(--md-dur-short4);
}
.btn-filled:hover { box-shadow: var(--md-elevation-1); }
.btn-filled:hover::before { opacity: 0.08; }
.btn-filled:active::before { opacity: 0.12; }
.btn-filled .icon svg { width: 18px; height: 18px; fill: currentColor; }

/* MD3 Outlined button */
.btn-outlined {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  height: 40px; border-radius: var(--md-shape-full);
  font-size: 14px; font-weight: 600; font-family: var(--font);
  border: 1px solid var(--md-sys-color-outline);
  color: var(--md-sys-color-primary);
  text-decoration: none;
  position: relative; overflow: hidden;
  transition: background var(--md-dur-short4);
}
.btn-outlined::before {
  content: ''; position: absolute; inset: 0;
  background: var(--md-sys-color-primary);
  opacity: 0; transition: opacity var(--md-dur-short4);
}
.btn-outlined:hover::before { opacity: 0.08; }
.btn-outlined:active::before { opacity: 0.12; }
.btn-outlined .icon svg { width: 18px; height: 18px; fill: currentColor; }

/* ══════════════════════════════════════════════
   LIST ROW — MD3 List item with 3-line support
══════════════════════════════════════════════ */
.project-row {
  background: var(--md-sys-color-surface);
  border-radius: var(--md-shape-md);
  padding: 12px 8px 12px 16px;
  display: flex; align-items: center; gap: 16px;
  position: relative; overflow: hidden;
  transition: background var(--md-dur-short4) var(--md-motion-standard);
  cursor: default;
}
.project-row::before {
  content: ''; position: absolute; inset: 0;
  background: var(--md-sys-color-on-surface);
  opacity: 0; transition: opacity var(--md-dur-short4);
}
.project-row:hover::before { opacity: 0.06; }

.row-leading {
  width: 60px; height: 60px; border-radius: var(--md-shape-md);
  overflow: hidden; flex-shrink: 0;
  background: var(--md-sys-color-surface-container);
}
.row-leading img { width: 100%; height: 100%; object-fit: cover; }
.row-leading-placeholder {
  width: 60px; height: 60px; border-radius: var(--md-shape-md);
  background: linear-gradient(135deg,
    var(--md-sys-color-primary-container),
    var(--md-sys-color-secondary-container));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.row-leading-placeholder .icon { color: var(--md-sys-color-on-primary-container); opacity: 0.6; }

.row-content { flex: 1; min-width: 0; }
.row-headline {
  font-size: 16px; font-weight: 600;
  color: var(--md-sys-color-on-surface);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.row-supporting {
  font-size: 14px; color: var(--md-sys-color-on-surface-variant);
  margin-top: 2px; font-weight: 500;
}
.row-trailing { display: flex; gap: 4px; flex-shrink: 0; z-index: 1; }

/* ══════════════════════════════════════════════
   SKELETON LOADING
══════════════════════════════════════════════ */
@keyframes skel {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.skel {
  background: linear-gradient(90deg,
    var(--md-sys-color-surface-container) 25%,
    var(--md-sys-color-surface-container-high) 50%,
    var(--md-sys-color-surface-container) 75%);
  background-size: 800px 100%;
  animation: skel 1.8s infinite linear;
  border-radius: var(--md-shape-sm);
}
.skel-card {
  background: var(--md-sys-color-surface-container-low);
  border-radius: var(--md-shape-xl); overflow: hidden;
}
.skel-media { aspect-ratio: 16/9; }
.skel-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.skel-chip { height: 32px; width: 90px; border-radius: var(--md-shape-sm); }
.skel-h2 { height: 20px; width: 70%; border-radius: var(--md-shape-xs); }
.skel-h3 { height: 16px; width: 45%; border-radius: var(--md-shape-xs); }
.skel-row { display: flex; gap: 8px; margin-top: 8px; }
.skel-btn { flex: 1; height: 40px; border-radius: var(--md-shape-full); }

/* ══════════════════════════════════════════════
   EMPTY & ERROR STATES
══════════════════════════════════════════════ */
.empty-state, .error-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 80px 32px; gap: 16px; text-align: center;
}
.state-icon-wrap {
  width: 80px; height: 80px; border-radius: var(--md-shape-xl);
  display: flex; align-items: center; justify-content: center;
}
.empty-icon-wrap { background: var(--md-sys-color-secondary-container); }
.empty-icon-wrap .icon { color: var(--md-sys-color-on-secondary-container); }
.error-icon-wrap { background: var(--md-sys-color-error-container); }
.error-icon-wrap .icon { color: var(--md-sys-color-on-error-container); }
.state-title { font-size: 22px; font-weight: 600; color: var(--md-sys-color-on-surface); }
.state-body { font-size: 15px; color: var(--md-sys-color-on-surface-variant); line-height: 1.6; max-width: 280px; }
.btn-tonal-reset {
  height: 40px; padding: 0 24px;
  border-radius: var(--md-shape-full);
  background: var(--md-sys-color-secondary-container);
  color: var(--md-sys-color-on-secondary-container);
  font-size: 14px; font-weight: 600; font-family: var(--font);
  margin-top: 8px; cursor: pointer;
  position: relative; overflow: hidden;
}
.btn-tonal-reset::before {
  content: ''; position: absolute; inset: 0;
  background: currentColor; opacity: 0; transition: opacity 200ms;
}
.btn-tonal-reset:hover::before { opacity: 0.08; }

/* ══════════════════════════════════════════════
   MENUS — MD3 Menu
══════════════════════════════════════════════ */
.scrim {
  position: fixed; inset: 0; z-index: 300;
  background: var(--md-sys-color-scrim);
  opacity: 0; pointer-events: none;
  transition: opacity var(--md-dur-medium2) var(--md-motion-standard);
}
.scrim.open { opacity: 1; pointer-events: auto; }
.md-menu {
  position: fixed; z-index: 301;
  background: var(--md-sys-color-surface-container);
  border-radius: var(--md-shape-xl);
  box-shadow: var(--md-elevation-3);
  min-width: 200px;
  overflow: hidden;
  transform-origin: top right;
  transform: scale(0.9) translateY(-12px);
  opacity: 0; pointer-events: none;
  transition: transform var(--md-dur-medium2) var(--md-motion-decelerate),
              opacity var(--md-dur-short4) var(--md-motion-standard);
}
.md-menu.open {
  transform: scale(1) translateY(0);
  opacity: 1; pointer-events: auto;
}
.menu-header {
  padding: 12px 16px 4px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--md-sys-color-on-surface-variant);
}
.menu-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  font-size: 14px; font-weight: 500; font-family: var(--font);
  color: var(--md-sys-color-on-surface);
  cursor: pointer; position: relative; overflow: hidden;
  transition: background var(--md-dur-short4);
}
.menu-item::before {
  content: ''; position: absolute; inset: 0;
  background: var(--md-sys-color-on-surface);
  opacity: 0; transition: opacity var(--md-dur-short4);
}
.menu-item:hover::before { opacity: 0.08; }
.menu-item.active { color: var(--md-sys-color-primary); }
.menu-item .icon svg { width: 20px; height: 20px; fill: currentColor; }
.menu-item-check { margin-left: auto; }
.menu-divider { height: 1px; background: var(--md-sys-color-outline-variant); margin: 4px 0; }

/* ══════════════════════════════════════════════
   BOTTOM NAV BAR — MD3
══════════════════════════════════════════════ */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bottom-nav-height);
  background: var(--md-sys-color-surface-container);
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
  border-top: 1px solid var(--md-sys-color-outline-variant);
}
.bottom-nav-inner {
  height: 80px; display: flex; align-items: center;
}
.bottom-nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px;
  height: 100%; cursor: pointer;
  position: relative;
}
.nav-indicator {
  width: 64px; height: 32px; border-radius: var(--md-shape-full);
  background: var(--md-sys-color-secondary-container);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  transition: width var(--md-dur-medium2) var(--md-motion-standard),
              background var(--md-dur-short4);
}
.nav-indicator::before {
  content: ''; position: absolute; inset: 0;
  background: var(--md-sys-color-on-secondary-container);
  opacity: 0; transition: opacity var(--md-dur-short4);
}
.bottom-nav-item:hover .nav-indicator::before { opacity: 0.08; }
.bottom-nav-item:not(.active) .nav-indicator {
  background: transparent;
}
.nav-icon { display: flex; color: var(--md-sys-color-on-surface-variant); }
.nav-icon svg { width: 24px; height: 24px; fill: currentColor; }
.bottom-nav-item.active .nav-icon { color: var(--md-sys-color-on-secondary-container); }
.nav-label {
  font-size: 12px; font-weight: 600;
  color: var(--md-sys-color-on-surface-variant);
}
.bottom-nav-item.active .nav-label { color: var(--md-sys-color-on-surface); }

/* ══════════════════════════════════════════════
   FOOTER
══════════════════════════════════════════════ */
.app-footer {
  text-align: center; padding: 20px 16px;
  font-size: 13px; color: var(--md-sys-color-on-surface-variant);
  border-top: 1px solid var(--md-sys-color-outline-variant);
}
.app-footer a { color: var(--md-sys-color-primary); font-weight: 600; }

/* ══════════════════════════════════════════════
   RIPPLE
══════════════════════════════════════════════ */
.ripple-surface { position: relative; overflow: hidden; }
.ripple {
  position: absolute; border-radius: 50%;
  background: currentColor; opacity: 0.12;
  transform: scale(0);
  animation: ripple 500ms var(--md-motion-standard) forwards;
  pointer-events: none;
}
@keyframes ripple { to { transform: scale(4); opacity: 0; } }

/* ══════════════════════════════════════════════
   RESPONSIVE LAYOUT
══════════════════════════════════════════════ */
@media (max-width: 599px) {
  :root { --nav-height: 64px; }
  .grid-layout { grid-template-columns: 1fr; }
  .projects-container { padding: 0 16px 96px; }
  .bottom-nav { display: block; }
  #topSortBtn, #topThemeBtn, #langChip { display: none; }
}
@media (min-width: 600px) and (max-width: 839px) {
  .grid-layout { grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 840px) and (max-width: 1199px) {
  .grid-layout { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 1200px) {
  .projects-container,
  .search-section, .filter-row, .toolbar {
    max-width: 1400px; margin-left: auto; margin-right: auto;
    padding-left: 24px; padding-right: 24px;
  }
  .projects-container { padding-bottom: 48px; }
  .grid-layout { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  .bar-headline { padding-left: 12px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>

    <symbol id="ic-error" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></symbol>
    <symbol id="ic-light" viewBox="0 0 24 24"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></symbol>
    <symbol id="ic-dark" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></symbol>
    <symbol id="ic-system" viewBox="0 0 24 24"><path d="M12 18c-.89 0-1.74-.2-2.5-.55C11.56 16.5 13 14.42 13 12s-1.44-4.5-3.5-5.45C10.26 6.2 11.11 6 12 6c3.31 0 6 2.69 6 6s-2.69 6-6 6zm0-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></symbol>
    <symbol id="ic-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></symbol>
  </defs>
</svg>

<script>
// ══════════════════════════════════════════════
// TRANSLATIONS
// ══════════════════════════════════════════════
const T = {
  en: {
    appTitle: 'Project List',
    search: 'Search projects…',
    all: 'All',
    sortBy: 'Sort by',
    nameAZ: 'Name A–Z', nameZA: 'Name Z–A',
    catAZ: 'Category A–Z', newest: 'Newest',
    results: n => `${n} project${n!==1?'s':''}`,
    noResults: 'No projects found',
    noResultsSub: 'Try adjusting your search or category filters.',
    reset: 'Reset filters',
    visit: 'Visit', src: 'Source',
    theme: 'Theme', themeL: 'Light', themeD: 'Dark', themeS: 'System',
    loading: 'Loading…',
    errTitle: 'Failed to load',
    errMsg: 'Could not fetch project data. Please check your connection.',
    home: 'Home', sort: 'Sort', language: 'Language',
    madeBy: 'Made by', aiBy: 'with Claude AI',
  },
  vi: {
    appTitle: 'Danh Sách Dự Án',
    search: 'Tìm kiếm dự án…',
    all: 'Tất cả',
    sortBy: 'Sắp xếp',
    nameAZ: 'Tên A–Z', nameZA: 'Tên Z–A',
    catAZ: 'Danh mục A–Z', newest: 'Mới nhất',
    results: n => `${n} dự án`,
    noResults: 'Không tìm thấy dự án',
    noResultsSub: 'Thử thay đổi từ khóa hoặc bộ lọc danh mục.',
    reset: 'Xóa bộ lọc',
    visit: 'Xem', src: 'Code',
    theme: 'Giao diện', themeL: 'Sáng', themeD: 'Tối', themeS: 'Hệ thống',
    loading: 'Đang tải…',
    errTitle: 'Không thể tải',
    errMsg: 'Không thể lấy dữ liệu. Vui lòng kiểm tra kết nối.',
    home: 'Trang chủ', sort: 'Sắp xếp', language: 'Ngôn ngữ',
    madeBy: 'Tạo bởi', aiBy: 'với Claude AI',
  }
};

// ══════════════════════════════════════════════
// SVG ICONS (inline helpers)
// ══════════════════════════════════════════════
const use = (id, size=24) =>
  `<svg width="${size}" height="${size}" fill="currentColor" viewBox="0 0 24 24"><use href="#${id}"/></svg>`;

const THEME_ICONS = {
  light: 'ic-light', dark: 'ic-dark', system: 'ic-system'
};

// ══════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════
const SHEET_ID = '1eyJ1EReaig8bkaHwHgDoNtvlLO2XSxxE3VrMRP3YHeA';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

const LS = {
  get: (k, d='') => { try { return localStorage.getItem('pl_'+k) ?? d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem('pl_'+k, v); } catch {} }
};

const app = {
  data: [], filtered: [],
  lang:     LS.get('lang', 'en'),
  theme:    LS.get('theme', 'system'),
  view:     LS.get('view', 'grid'),
  sort:     LS.get('sort', 'nameAZ'),
  category: LS.get('cat', 'all'),
  query:    '',
  activeMenu: null,

  get t() { return T[this.lang]; },

  async init() {
    this.applyTheme(false);
    this.updateUI();
    this.renderSkeletons();
    this.bindEvents();
    try {
      await this.fetchData();
      this.buildChips();
      this.applyFilters();
    } catch(e) {
      this.renderError();
    }
  },

  async fetchData() {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^\(]+\(/, '').replace(/\);\s*$/, ''));
    const cols = json.table.cols.map(c => (c.label||'').toLowerCase().trim());
    this.data = json.table.rows.map((row, i) => {
      const o = {_i: i};
      cols.forEach((c, j) => { o[c] = row.c[j]?.v ?? row.c[j]?.f ?? ''; });
      return o;
    }).filter(r => r.name);
  },

  buildChips() {
    const cats = ['all', ...new Set(this.data.map(p=>p.category).filter(Boolean).sort())];
    const row = document.getElementById('filterRow');
    row.innerHTML = cats.map(cat => `
      <button class="filter-chip ripple-surface${this.category===cat?' selected':''}"
        data-cat="${cat}" aria-pressed="${this.category===cat}">
        <span class="chip-icon chip-check">${use('ic-check',18)}</span>
        <span class="chip-icon chip-icon-base">${use(cat==='all'?'ic-apps':'ic-folder',18)}</span>
        ${cat==='all' ? this.t.all : cat}
      </button>`).join('');
    row.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        this.category = btn.dataset.cat;
        LS.set('cat', this.category);
        row.querySelectorAll('.filter-chip').forEach(b => {
          b.classList.toggle('selected', b.dataset.cat===this.category);
          b.setAttribute('aria-pressed', b.dataset.cat===this.category);
        });
        this.applyFilters();
      });
      this.addRipple(btn);
    });
  },

  applyFilters() {
    let list = [...this.data];
    if (this.category !== 'all') list = list.filter(p => p.category===this.category);
    if (this.query) {
      const q = this.query.toLowerCase();
      list = list.filter(p =>
        (p.name||'').toLowerCase().includes(q) ||
        (p.category||'').toLowerCase().includes(q));
    }
    this.filtered = this.sortData(list);
    this.renderProjects();
  },

  sortData(list) {
    return list.slice().sort((a,b) => {
      if (this.sort==='nameAZ')  return (a.name||'').localeCompare(b.name||'');
      if (this.sort==='nameZA')  return (b.name||'').localeCompare(a.name||'');
      if (this.sort==='catAZ')   return (a.category||'').localeCompare(b.category||'');
      if (this.sort==='newest')  return b._i - a._i;
      return 0;
    });
  },

  renderProjects() {
    const out = document.getElementById('projectsOutput');
    document.getElementById('resultCount').textContent = this.t.results(this.filtered.length);

    if (!this.filtered.length) {
      out.className = ''; out.innerHTML = this.emptyHTML(); return;
    }
    out.className = this.view==='grid' ? 'grid-layout' : 'list-layout';
    out.innerHTML = this.filtered.map(p =>
      this.view==='grid' ? this.cardHTML(p) : this.rowHTML(p)).join('');

    out.querySelectorAll('.ripple-surface').forEach(el => this.addRipple(el));

    // Lazy-load images
    out.querySelectorAll('img[data-src]').forEach(img => {
      const obs = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) {
          const el = entries[0].target;
          const tmp = new Image();
          tmp.onload = () => { el.src = el.dataset.src; el.style.opacity=1; };
          tmp.onerror = () => el.closest('.card-media, .row-leading')
            ?.replaceWith(this.makePlaceholder(el.closest('.project-card') ? 'card' : 'row'));
          tmp.src = el.dataset.src;
          obs.disconnect();
        }
      }, { rootMargin: '200px' });
      obs.observe(img);
    });
  },

  makePlaceholder(type) {
    const d = document.createElement('div');
    if (type==='card') {
      d.className = 'card-media-placeholder';
      d.innerHTML = `<span class="icon icon-lg">${use('ic-code',32)}</span>`;
    } else {
      d.className = 'row-leading-placeholder';
      d.innerHTML = `<span class="icon">${use('ic-code')}</span>`;
    }
    return d;
  },

  cardHTML(p) {
    const media = p.image
      ? `<div class="card-media"><img data-src="${this.ea(p.image)}" src="" alt="${this.ea(p.name)}" style="opacity:0" /></div>`
      : `<div class="card-media-placeholder"><span class="icon icon-lg">${use('ic-code',32)}</span></div>`;
    const visit = p.url
      ? `<a class="btn-filled ripple-surface" href="${this.ea(p.url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
          <span class="icon">${use('ic-link',18)}</span>${this.t.visit}</a>` : '';
    const src = p.source_code
      ? `<a class="btn-outlined ripple-surface" href="${this.ea(p.source_code)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
          <span class="icon">${use('ic-code',18)}</span>${this.t.src}</a>` : '';
    return `
      <article class="project-card">
        ${media}
        <div class="card-body">
          ${p.category ? `<div class="category-chip"><span class="icon" style="width:14px;height:14px">${use('ic-folder',14)}</span>${this.e(p.category)}</div>` : ''}
          <h2 class="card-title">${this.e(p.name)}</h2>
          ${visit||src ? `<div class="card-actions">${visit}${src}</div>` : ''}
        </div>
      </article>`;
  },

  rowHTML(p) {
    const lead = p.image
      ? `<div class="row-leading"><img data-src="${this.ea(p.image)}" src="" alt="" style="opacity:0;width:100%;height:100%;object-fit:cover" /></div>`
      : `<div class="row-leading-placeholder"><span class="icon">${use('ic-code')}</span></div>`;
    const visit = p.url
      ? `<a class="md-icon-btn" href="${this.ea(p.url)}" target="_blank" rel="noopener noreferrer" title="${this.t.visit}" onclick="event.stopPropagation()">
          <span class="icon">${use('ic-link')}</span></a>` : '';
    const src = p.source_code
      ? `<a class="md-icon-btn" href="${this.ea(p.source_code)}" target="_blank" rel="noopener noreferrer" title="${this.t.src}" onclick="event.stopPropagation()">
          <span class="icon">${use('ic-code')}</span></a>` : '';
    return `
      <div class="project-row">
        ${lead}
        <div class="row-content">
          <div class="row-headline">${this.e(p.name)}</div>
          ${p.category ? `<div class="row-supporting">${this.e(p.category)}</div>` : ''}
        </div>
        <div class="row-trailing">${visit}${src}</div>
      </div>`;
  },

  emptyHTML() {
    return `<div class="empty-state">
      <div class="state-icon-wrap empty-icon-wrap"><span class="icon icon-lg">${use('ic-search-off',32)}</span></div>
      <div class="state-title">${this.t.noResults}</div>
      <div class="state-body">${this.t.noResultsSub}</div>
      <button class="btn-tonal-reset" onclick="app.reset()">${this.t.reset}</button>
    </div>`;
  },

  renderSkeletons() {
    const out = document.getElementById('projectsOutput');
    out.className = 'grid-layout';
    out.innerHTML = Array(8).fill(0).map(()=>`
      <div class="skel-card">
        <div class="skel skel-media"></div>
        <div class="skel-body">
          <div class="skel skel-chip"></div>
          <div class="skel skel-h2"></div>
          <div class="skel skel-h3"></div>
          <div class="skel-row"><div class="skel skel-btn"></div><div class="skel skel-btn"></div></div>
        </div>
      </div>`).join('');
  },

  renderError() {
    document.getElementById('projectsOutput').innerHTML = `
      <div class="error-state">
        <div class="state-icon-wrap error-icon-wrap"><span class="icon icon-lg">${use('ic-error',32)}</span></div>
        <div class="state-title">${this.t.errTitle}</div>
        <div class="state-body">${this.t.errMsg}</div>
      </div>`;
  },

  reset() {
    this.query=''; this.category='all';
    document.getElementById('searchInput').value='';
    document.getElementById('searchClear').classList.remove('visible');
    LS.set('cat','all');
    this.buildChips(); this.applyFilters();
  },

  // ── MENUS ──
  showSortMenu() {
    const menu = document.getElementById('sortMenu');
    const items = document.getElementById('sortMenuItems');
    document.getElementById('sortMenuTitle').textContent = this.t.sortBy;
    const opts = [
      {k:'nameAZ', icon:'ic-list', l:()=>this.t.nameAZ},
      {k:'nameZA', icon:'ic-list', l:()=>this.t.nameZA},
      {k:'catAZ',  icon:'ic-folder', l:()=>this.t.catAZ},
      {k:'newest', icon:'ic-apps', l:()=>this.t.newest},
    ];
    items.innerHTML = opts.map(o=>`
      <div class="menu-item ripple-surface${this.sort===o.k?' active':''}" data-sort="${o.k}">
        <span class="icon">${use(o.icon,20)}</span>${o.l()}
        <span class="menu-item-check icon" style="margin-left:auto;opacity:${this.sort===o.k?1:0}">${use('ic-check',20)}</span>
      </div>`).join('');
    items.querySelectorAll('.menu-item').forEach(el => {
      this.addRipple(el);
      el.addEventListener('click', ()=>{
        this.sort = el.dataset.sort;
        LS.set('sort', this.sort);
        this.updateSortLabel();
        this.applyFilters();
        this.closeMenus();
      });
    });
    this.openMenu('sort');
  },

  showThemeMenu() {
    const items = document.getElementById('themeMenuItems');
    document.getElementById('themeMenuTitle').textContent = this.t.theme;
    const opts = [
      {k:'light', icon:'ic-light', l:()=>this.t.themeL},
      {k:'dark',  icon:'ic-dark',  l:()=>this.t.themeD},
      {k:'system',icon:'ic-system',l:()=>this.t.themeS},
    ];
    items.innerHTML = opts.map(o=>`
      <div class="menu-item ripple-surface${this.theme===o.k?' active':''}" data-th="${o.k}">
        <span class="icon">${use(o.icon,20)}</span>${o.l()}
        <span class="menu-item-check icon" style="margin-left:auto;opacity:${this.theme===o.k?1:0}">${use('ic-check',20)}</span>
      </div>`).join('');
    items.querySelectorAll('.menu-item').forEach(el=>{
      this.addRipple(el);
      el.addEventListener('click',()=>{
        this.theme=el.dataset.th; LS.set('theme',this.theme);
        this.applyTheme(); this.closeMenus();
      });
    });
    this.openMenu('theme');
  },

  openMenu(name) {
    this.closeMenus();
    const menu = document.getElementById(name+'Menu');
    const btn  = document.getElementById(name==='sort'?'topSortBtn':'topThemeBtn');
    const rect = btn.getBoundingClientRect();
    menu.style.top = (rect.bottom + 4)+'px';
    menu.classList.add('open');
    document.getElementById('scrim').classList.add('open');
    this.activeMenu = name;
  },

  closeMenus() {
    ['sortMenu','themeMenu'].forEach(id=>document.getElementById(id).classList.remove('open'));
    document.getElementById('scrim').classList.remove('open');
    this.activeMenu = null;
  },

  // ── THEME ──
  applyTheme(animate=true) {
    const dark = this.theme==='dark' ||
      (this.theme==='system' && window.matchMedia('(prefers-color-scheme:dark)').matches);
    document.documentElement.setAttribute('data-theme', dark?'dark':'light');
    document.getElementById('meta-theme').content = dark?'#111318':'#1565C0';
    this.updateThemeIcons();
  },

  cycleTheme() {
    const order=['light','dark','system'];
    this.theme = order[(order.indexOf(this.theme)+1)%3];
    LS.set('theme',this.theme); this.applyTheme();
  },

  updateThemeIcons() {
    const ic = THEME_ICONS[this.theme];
    document.getElementById('topThemeIcon').innerHTML = use(ic);
    document.getElementById('bnThemeIconWrap').innerHTML = use(ic);
  },

  // ── LANG ──
  updateUI() {
    document.documentElement.lang = this.lang;
    document.getElementById('appTitle').textContent = this.t.appTitle;
    document.getElementById('searchInput').placeholder = this.t.search;
    document.getElementById('langLabel').textContent = this.lang==='en'?'EN':'VI';
    document.getElementById('bnHomeLabel').textContent = this.t.home;
    document.getElementById('bnSortLabel').textContent = this.t.sort;
    document.getElementById('bnLangLabel').textContent = this.t.language;
    document.getElementById('bnThemeLabel').textContent = this.t.theme;
    document.getElementById('appFooter').innerHTML =
      `${this.t.madeBy} <a href="https://github.com/trongsigmaprovip" target="_blank" rel="noopener">trongsigmaprovip</a> · ${this.t.aiBy}`;
    this.updateSortLabel();
    const rc = document.getElementById('resultCount');
    if (this.filtered.length) rc.textContent = this.t.results(this.filtered.length);
  },

  toggleLang() {
    this.lang = this.lang==='en'?'vi':'en';
    LS.set('lang',this.lang); this.updateUI();
    if (this.data.length) this.buildChips();
  },

  // ── VIEW ──
  toggleView() {
    this.view = this.view==='grid'?'list':'grid';
    LS.set('view',this.view); this.updateViewIcons();
    if (this.filtered.length) this.renderProjects();
  },

  updateViewIcons() {
    const icon = this.view==='grid' ? use('ic-list') : use('ic-grid');
    document.getElementById('topViewIcon').innerHTML = icon;
    document.getElementById('toolbarViewIcon').innerHTML = icon;
  },

  updateSortLabel() {
    const m = {nameAZ:()=>this.t.nameAZ, nameZA:()=>this.t.nameZA,
               catAZ:()=>this.t.catAZ, newest:()=>this.t.newest};
    document.getElementById('sortLabel').textContent = m[this.sort]?.()??'';
  },

  // ── BOTTOM NAV ──
  bnSelect(id) {
    document.querySelectorAll('.bottom-nav-item').forEach(el=>el.classList.remove('active'));
    document.getElementById('bn'+id)?.classList.add('active');
  },

  // ── RIPPLE ──
  addRipple(el) {
    if (el._ripple) return; el._ripple = true;
    el.addEventListener('pointerdown', e => {
      const r = el.getBoundingClientRect();
      const size = Math.max(r.width,r.height)*2.5;
      const x = e.clientX-r.left-size/2, y = e.clientY-r.top-size/2;
      const rip = document.createElement('span');
      rip.className='ripple';
      rip.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
      el.appendChild(rip);
      setTimeout(()=>rip.remove(), 600);
    });
  },

  // ── BIND ──
  bindEvents() {
    window.addEventListener('scroll', () => {
      document.getElementById('topBar').classList.toggle('scrolled', window.scrollY>4);
    }, {passive:true});

    const si = document.getElementById('searchInput');
    const sc = document.getElementById('searchClear');
    si.addEventListener('input', () => {
      this.query = si.value;
      sc.classList.toggle('visible', this.query.length>0);
      this.applyFilters();
    });
    sc.addEventListener('click', () => {
      si.value=''; this.query=''; sc.classList.remove('visible');
      this.applyFilters(); si.focus();
    });

    document.getElementById('topSortBtn').addEventListener('click', ()=>this.showSortMenu());
    document.getElementById('toolbarSortBtn').addEventListener('click', ()=>this.showSortMenu());
    document.getElementById('topThemeBtn').addEventListener('click', ()=>this.showThemeMenu());
    document.getElementById('topViewBtn').addEventListener('click', ()=>this.toggleView());
    document.getElementById('toolbarViewBtn').addEventListener('click', ()=>this.toggleView());
    document.getElementById('langChip').addEventListener('click', ()=>this.toggleLang());
    document.getElementById('scrim').addEventListener('click', ()=>this.closeMenus());

    window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', ()=>{
      if (this.theme==='system') this.applyTheme();
    });

    document.addEventListener('keydown', e=>{
      if (e.key==='Escape') this.closeMenus();
      if ((e.ctrlKey||e.metaKey)&&e.key==='k') { e.preventDefault(); si.focus(); }
    });

    ['toolbarSortBtn','toolbarViewBtn'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) this.addRipple(el);
    });
  },

  e(s)  { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
  ea(s) { return String(s??'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); },
};

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

app.init();
</script>
</body>
</html>
